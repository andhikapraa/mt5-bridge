services:
  mt5:
    image: ghcr.io/andhikapraa/mt5-bridge:latest
    container_name: mt5-bridge
    restart: unless-stopped
    pull_policy: always

    # Linuxserver KasmVNC base is known to work without seccomp tweaks but
    # SYS_PTRACE is still recommended for MT5 — Wine's NT thread emulation
    # and MT5's anti-debug check both want it.
    cap_add:
      - SYS_PTRACE

    ports:
      - "[REDACTED]:3000:3000"   # KasmVNC web UI (linuxserver base)
      - "[REDACTED]:8000:8000"   # FastAPI REST + Swagger /docs
      - "[REDACTED]:8001:8001"   # mt5linux RPyC (socat-forwarded)

    environment:
      # KasmVNC auth (linuxserver convention: CUSTOM_USER + PASSWORD).
      CUSTOM_USER:   ${CUSTOM_USER:-trader}
      PASSWORD:      ${PASSWORD}

      # FastAPI shim + auto-login.
      API_KEY:       ${API_KEY}
      MT5_LOGIN:     ${MT5_LOGIN}
      MT5_PASSWORD:  ${MT5_PASSWORD}
      MT5_SERVER:    ${MT5_SERVER}
      ALLOWED_ORIGINS: "http://[REDACTED]:8000,http://localhost:8000"
      LOG_LEVEL:     INFO

    volumes:
      - mt5_state:/config

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 600s     # MT5 + Python + pip first-boot install can take ~5 min

    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

volumes:
  mt5_state:
