services:
  mt5:
    image: ghcr.io/andhikapraa/mt5-bridge:latest
    container_name: mt5-bridge
    restart: unless-stopped
    pull_policy: always   # force fresh pull from GHCR on every redeploy

    # MANDATORY for Wine on GCP: container runtime's default seccomp profile
    # blocks the socket syscalls Wine needs. Without these two, every Wine
    # subprocess exits instantly with "socket : Function not implemented".
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_PTRACE

    # All ports bound to Tailscale IP — nothing reaches the public GCP interface.
    ports:
      - "[REDACTED]:3000:3000"   # noVNC (browser desktop)
      - "[REDACTED]:8000:8000"   # FastAPI REST + Swagger /docs
      - "[REDACTED]:8001:8001"   # mt5linux RPyC (for direct Python clients)

    environment:
      API_KEY:       ${API_KEY}
      VNC_PASSWORD:  ${VNC_PASSWORD}
      MT5_LOGIN:     ${MT5_LOGIN}
      MT5_PASSWORD:  ${MT5_PASSWORD}
      MT5_SERVER:    ${MT5_SERVER}
      ALLOWED_ORIGINS: "http://[REDACTED]:8000,http://localhost:8000"
      LOG_LEVEL:     INFO

    volumes:
      # Persists Wine prefix + MT5 install + install markers across restarts.
      - mt5_data:/config

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 600s   # First boot: MT5 install + Wine python + pip can take ~5 min.

    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

volumes:
  mt5_data:
